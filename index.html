<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<title>AI návrhář trvalkového záhonu</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#eef4ef;
color:#2d3a2f;
}

header{
background:linear-gradient(120deg,#3b7d4a,#6fbf7f);
color:white;
padding:40px;
text-align:center;
}

header h1{
margin:0;
font-size:32px;
}

header p{
margin-top:10px;
opacity:0.9;
}

.container{
max-width:1000px;
margin:auto;
margin-top:-40px;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#3b7d4a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2f623b;
transform:scale(1.02);
}

.result{
margin-top:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#f3f8f4;
padding:15px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card h4{
margin:0 0 5px 0;
color:#2f6b3b;
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<header>

<h1>🌿 AI návrhář trvalkového záhonu</h1>
<p>Navrhni ideální kombinaci rostlin podle podmínek zahrady</p>

</header>

<div class="container">

<div class="form-grid">

<div>

<label>Šířka záhonu (m)</label>
<input id="sirka" type="number" value="3">

</div>

<div>

<label>Délka záhonu (m)</label>
<input id="delka" type="number" value="2">

</div>

<div>

<label>Světlo</label>
<select id="svetlo">
<option value="slunce">Slunce</option>
<option value="polostin">Polostín</option>
<option value="stin">Stín</option>
</select>

</div>

<div>

<label>Půda</label>
<select>
<option>Suchá</option>
<option>Normální</option>
<option>Vlhká</option>
</select>

</div>

</div>

<button onclick="navrhni()">Navrhni výsadbu</button>

<div id="vysledek" class="result"></div>

</div>

<footer>

AI experiment – návrh trvalkových záhonů

</footer>

<script>

const databaze={

slunce:[
"Lavandula angustifolia",
"Salvia nemorosa",
"Echinacea purpurea",
"Perovskia atriplicifolia",
"Nepeta faassenii",
"Gaura lindheimeri"
],

polostin:[
"Geranium Rozanne",
"Heuchera Palace Purple",
"Astilbe chinensis",
"Brunnera macrophylla",
"Alchemilla mollis",
"Hosta Halcyon"
],

stin:[
"Hosta",
"Dryopteris filix-mas",
"Brunnera",
"Pulmonaria",
"Tiarella",
"Polygonatum"
]

};

function randomPlants(arr){

return arr.sort(()=>0.5-Math.random()).slice(0,4);

}

function navrhni(){

let sirka=document.getElementById("sirka").value;
let delka=document.getElementById("delka").value;
let svetlo=document.getElementById("svetlo").value;

let plocha=sirka*delka;

let hustota=5;

let vybrane=randomPlants(databaze[svetlo]);

let pocet=Math.round((plocha*hustota)/vybrane.length);

let html="<h3>Doporučená kombinace rostlin</h3>";
html+="<div class='cards'>";

vybrane.forEach(r=>{

html+=`
<div class="card">
<h4>${r}</h4>
<p>${pocet} ks</p>
</div>
`;

});

html+="</div>";

document.getElementById("vysledek").innerHTML=html;

}

</script>

</body>
</html>
