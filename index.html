<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<title>AI návrhář trvalkového záhonu</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#eef4ef;
color:#2d3a2f;
}

header{
background:linear-gradient(120deg,#3b7d4a,#6fbf7f);
color:white;
padding:45px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
margin-top:-40px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:25px;
width:100%;
padding:15px;
background:#3b7d4a;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#f3f8f4;
padding:15px;
border-radius:10px;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

.layer{
display:flex;
gap:15px;
justify-content:center;
margin:15px 0;
}

.plant{
width:120px;
text-align:center;
}

.plant img{
width:100%;
height:90px;
object-fit:cover;
border-radius:6px;
}

footer{
text-align:center;
padding:25px;
color:#666;
}

</style>

</head>
<body>

<header>
<h1>🌿 AI návrhář trvalkového záhonu</h1>
<p>Návrh trvalek a travin podle principů zahradní architektury</p>
</header>

<div class="container">

<div class="form-grid">

<div>
<label>Šířka záhonu (m)</label>
<input id="sirka" type="number" value="3">
</div>

<div>
<label>Délka záhonu (m)</label>
<input id="delka" type="number" value="2">
</div>

<div>
<label>Světlo</label>
<select id="svetlo">
<option value="slunce">Slunce</option>
<option value="polostin">Polostín</option>
</select>
</div>

<div>
<label>Půda</label>
<select id="puda">
<option value="sucha">Suchá</option>
<option value="normalni">Normální</option>
<option value="vlhka">Vlhká</option>
</select>
</div>

</div>

<button onclick="navrhni()">Navrhni výsadbu</button>

<div id="vysledek"></div>

</div>

<footer>
AI experiment – návrh trvalkových záhonů
</footer>

<script>

const databaze=[

{
cz:"Levandule úzkolistá",
lat:"Lavandula angustifolia 'Hidcote'",
vrstva:"predni",
img:"https://upload.wikimedia.org/wikipedia/commons/3/32/Lavandula_angustifolia_%27Hidcote%27.jpg"
},

{
cz:"Šanta kočičí",
lat:"Nepeta × faassenii 'Walker's Low'",
vrstva:"predni",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Nepeta_faassenii.jpg"
},

{
cz:"Šalvěj hajní",
lat:"Salvia nemorosa 'Caradonna'",
vrstva:"stred",
img:"https://upload.wikimedia.org/wikipedia/commons/4/4e/Salvia_nemorosa.jpg"
},

{
cz:"Třapatka nachová",
lat:"Echinacea purpurea 'Magnus'",
vrstva:"stred",
img:"https://upload.wikimedia.org/wikipedia/commons/2/21/Echinacea_purpurea.jpg"
},

{
cz:"Dochan psárkovitý",
lat:"Pennisetum alopecuroides 'Hameln'",
vrstva:"zadni",
img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Pennisetum_alopecuroides.jpg"
},

{
cz:"Třtina ostrokvětá",
lat:"Calamagrostis × acutiflora 'Karl Foerster'",
vrstva:"zadni",
img:"https://upload.wikimedia.org/wikipedia/commons/8/8e/Calamagrostis_acutiflora.jpg"
}

];

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function navrhni(){

let vybrane=shuffle(databaze).slice(0,5);

let html="<h3>Doporučené rostliny</h3><div class='cards'>";

vybrane.forEach(r=>{

html+=`
<div class="card">
<img src="${r.img}">
<h4>${r.cz}</h4>
<div>${r.lat}</div>
</div>
`;

});

html+="</div>";

html+="<h3>Vizualizace záhonu</h3>";

["zadni","stred","predni"].forEach(vrstva=>{

html+="<div class='layer'>";

vybrane.filter(p=>p.vrstva==vrstva).forEach(r=>{

html+=`
<div class="plant">
<img src="${r.img}">
<div>${r.cz.split(" ")[0]}</div>
</div>
`;

});

html+="</div>";

});

document.getElementById("vysledek").innerHTML=html;

}

</script>

</body>
</html>
