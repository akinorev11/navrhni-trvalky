<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>AI návrhář trvalkového záhonu</title>
<style>
body{
  font-family: system-ui, sans-serif;
  margin:0; background:#eef4ef; color:#2d3a2f;
}
header{
  background: linear-gradient(120deg,#3b7d4a,#6fbf7f);
  color:white; padding:45px; text-align:center;
}
header h1{ margin:0; font-size:34px; }
.container{
  max-width:1100px; margin:auto; margin-top:-40px;
  background:white; padding:35px;
  border-radius:12px; box-shadow:0 15px 30px rgba(0,0,0,.15);
}
.form-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:20px;
}
label{ font-weight:600; }
input, select{
  width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;
}
button{
  margin-top:25px; width:100%; padding:15px;
  background:#3b7d4a; color:white; border:none; border-radius:8px;
  font-size:17px; cursor:pointer;
}
button:hover{ background:#2f623b; }
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:25px;
}
.card{
  background:#f3f8f4; padding:15px;
  border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.card img{
  width:100%; height:150px; object-fit:cover;
  border-radius:8px;
}
.card h4{ margin:10px 0 4px 0; }
.card small{ color:#666; }
.bed{ margin-top:30px; }
.layer{
  display:flex; justify-content:center; gap:10px; margin:10px 0;
}
.plant{
  width:120px; text-align:center;
}
.plant img{
  width:100%; height:80px; object-fit:cover;
  border-radius:6px;
}
footer{
  text-align:center; padding:25px; color:#666;
}
</style>
</head>
<body>

<header>
  <h1>🌿 AI návrhář trvalkového záhonu</h1>
  <p>Zkombinujte trvalky a traviny podle stanoviště</p>
</header>

<div class="container">
  <div class="form-grid">
    <div>
      <label>Šířka záhonu (m)</label>
      <input id="sirka" type="number" value="3">
    </div>
    <div>
      <label>Délka záhonu (m)</label>
      <input id="delka" type="number" value="2">
    </div>
    <div>
      <label>Světlo</label>
      <select id="svetlo">
        <option value="slunce">Plné slunce</option>
        <option value="polostin">Polostín</option>
        <option value="stin">Stín</option>
      </select>
    </div>
    <div>
      <label>Půda</label>
      <select id="puda">
        <option value="sucha">Suchá</option>
        <option value="normalni">Normální</option>
        <option value="vlhka">Vlhká</option>
      </select>
    </div>
  </div>

  <button onclick="navrhni()">Navrhni výsadbu</button>

  <div id="vysledek"></div>
</div>

<footer>
  AI experiment – návrh trvalkových záhonů
</footer>

<script>
// Databáze rostlin: český/latinský název, typ, vrstva, foto (volitelně)
const databaze = {
  slunce:{
    sucha:[
      {cz:"Levandule úzkolistá", lat:"Lavandula angustifolia ‘Hidcote’", typ:"trvalka", vrstva:"stred", img:"https://images.unsplash.com/photo-1597848212624-ea9b1b7d0f3e"},
      {cz:"Šalvěj hajní", lat:"Salvia nemorosa ‘Caradonna’", typ:"trvalka", vrstva:"stred", img:"https://images.unsplash.com/photo-1598899134739-24c46f58f273"},
      {cz:"Dochan čínský", lat:"Pennisetum alopecuroides", typ:"trávina", vrstva:"zadni", img:"https://images.unsplash.com/photo-1510981416949-2e060b2eb785"}
    ],
    normalni:[
      {cz:"Třapatka nachová", lat:"Echinacea purpurea ‘Magnus’", typ:"trvalka", vrstva:"stred", img:"https://images.unsplash.com/photo-1591886960571-74d43a9d4166"},
      {cz:"Rozchodník velký", lat:"Sedum spectabile ‘Autumn Joy’", typ:"trvalka", vrstva:"predni", img:"https://images.unsplash.com/photo-1515984976648-918354cd8e79"},
      {cz:"Proso prutnaté", lat:"Panicum virgatum", typ:"trávina", vrstva:"zadni", img:"https://images.unsplash.com/photo-1586319193994-78293a79c944"}
    ],
    vlhka:[
      {cz:"Ozdobnice čínská", lat:"Miscanthus sinensis", typ:"trávina", vrstva:"zadni", img:"https://images.unsplash.com/photo-1587691598394-e64fc603a7bc"}
    ]
  },
  polostin:{
    normalni:[
      {cz:"Čechrava velkokvětá", lat:"Heuchera ‘Palace Purple’", typ:"trvalka", vrstva:"predni", img:"https://images.unsplash.com/photo-1597848212624-ea9b1b7d0f3e"},
      {cz:"Dlužicha hvězdovitá", lat:"Astrantia major", typ:"trvalka", vrstva:"stred", img:"https://images.unsplash.com/photo-1523110561225-089a0a48bd0c"}
    ],
    vlhka:[
      {cz:"Astilba čínská", lat:"Astilbe chinensis", typ:"trvalka", vrstva:"stred", img:"https://images.unsplash.com/photo-1565692051683-7e5eed16a752"},
      {cz:"Pomněnkovec velký", lat:"Brunnera macrophylla", typ:"trvalka", vrstva:"predni", img:"https://images.unsplash.com/photo-1588423142516-0e52fee29c67"}
    ]
  },
  stin:{
    normalni:[
      {cz:"Bohyška hortenziovitá", lat:"Rodgersia podophylla", typ:"trvalka", vrstva:"predni", img:"https://images.unsplash.com/photo-1597764698116-2cf650c4a4ca"},
      {cz:"Japonská tráva", lat:"Hakonechloa macra", typ:"trávina", vrstva:"zadni", img:"https://images.unsplash.com/photo-1596979400781-3036823bed9b"}
    ]
  }
};

// Funkce pro náhodný výběr rostlin
function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function navrhni(){
  const sirka = parseFloat(document.getElementById("sirka").value);
  const delka = parseFloat(document.getElementById("delka").value);
  const svetlo = document.getElementById("svetlo").value;
  const puda = document.getElementById("puda").value;

  // Získání vhodných rostlin ze struktury
  const mozne = databaze[svetlo]?.[puda];
  if(!mozne){
    document.getElementById("vysledek").innerHTML = "<p>Pro dané podmínky nejsou data.</p>";
    return;
  }

  // Náhodný výběr několika rostlin
  const vybrane = shuffle(mozne).slice(0, 4);

  // Počet kusů vypočteme podle plochy (orientační 7 rostlin/m²)
  const plocha = sirka * delka;
  const pocet = Math.max(3, Math.round((plocha * 7) / vybrane.length));

  // Generování HTML pro karty rostlin
  let html = "<h3>Doporučené rostliny</h3><div class='cards'>";
  vybrane.forEach(r => {
    html += `
      <div class="card">
        <img src="${r.img}">
        <h4>${r.cz}</h4>
        <small>${r.lat}</small>
        <p>Typ: ${r.typ}</p>
        <p>Počet: ${pocet} ks</p>
      </div>`;
  });
  html += "</div>";

  // Barevná paleta (pro ilustraci barev trvalek)
  html += "<h3>Barevná paleta záhonu</h3>";
  html += "<div>";
  vybrane.forEach(r => {
    // Využijeme barvu květu z předpřipraveného mapování (příklad)
    const colorMap = {
      "Lavandula angustifolia ‘Hidcote’":"#7B68EE", // levandule (fialová)
      "Salvia nemorosa ‘Caradonna’":"#9370DB",
      "Echinacea purpurea ‘Magnus’":"#DA70D6",
      "Sedum spectabile ‘Autumn Joy’":"#FF8C00",
      "Miscanthus sinensis":"#FFD700",
      "Pennisetum alopecuroides":"#D2B48C",
      "Heuchera ‘Palace Purple’":"#6B8E23",
      "Astrantia major":"#DAA520",
      "Astilbe chinensis":"#F08080",
      "Brunnera macrophylla":"#6495ED",
      "Hakonechloa macra":"#ADFF2F",
      "Rodgersia podophylla":"#20B2AA"
    };
    const c = colorMap[r.lat] || "#CCCCCC";
    html += `<div class="color-dot" style="background:${c}"></div>`;
  });
  html += "</div>";

  // Vizualizace záhonu: 3 vrstvy (v přední, střed, zadní)
  html += "<h3>Vizualizace výsadby</h3>";
  html += "<div class='bed'>";
  ["zadni", "stred", "predni"].forEach(vrstva => {
    html += "<div class='layer'>";
    vybrane.filter(p => p.vrstva === vrstva).forEach(r => {
      html += `
        <div class="plant">
          <img src="${r.img}">
          <div>${r.cz.split(" ")[0]}</div>
        </div>`;
    });
    html += "</div>";
  });
  html += "</div>";

  document.getElementById("vysledek").innerHTML = html;
}
</script>
</body>
</html>
