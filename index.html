<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<title>AI návrhář trvalkového záhonu</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#eef4ef;
color:#2d3a2f;
}

header{
background:linear-gradient(120deg,#3b7d4a,#6fbf7f);
color:white;
padding:50px;
text-align:center;
}

header h1{
margin:0;
font-size:34px;
}

header p{
opacity:.9;
}

.container{
max-width:1100px;
margin:auto;
margin-top:-40px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:600;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:25px;
width:100%;
padding:16px;
background:#3b7d4a;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#2f623b;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#f3f8f4;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.card h4{
margin:10px 0 5px 0;
color:#2f6b3b;
}

.palette{
display:flex;
gap:10px;
margin-top:10px;
}

.color-dot{
width:22px;
height:22px;
border-radius:50%;
border:1px solid #aaa;
}

.bed{
margin-top:15px;
display:grid;
grid-template-columns:repeat(10,1fr);
gap:4px;
}

.cell{
height:28px;
border-radius:4px;
}

footer{
text-align:center;
padding:25px;
color:#666;
}

</style>

</head>
<body>

<header>
<h1>🌿 AI návrhář trvalkového záhonu</h1>
<p>Navrhni ideální kombinaci rostlin podle podmínek zahrady</p>
</header>

<div class="container">

<div class="form-grid">

<div>
<label>Šířka záhonu (m)</label>
<input id="sirka" type="number" value="3">
</div>

<div>
<label>Délka záhonu (m)</label>
<input id="delka" type="number" value="2">
</div>

<div>
<label>Světlo</label>
<select id="svetlo">
<option value="slunce">Slunce</option>
<option value="polostin">Polostín</option>
<option value="stin">Stín</option>
</select>
</div>

<div>
<label>Půda</label>
<select id="puda">
<option value="sucha">Suchá</option>
<option value="normalni">Normální</option>
<option value="vlhka">Vlhká</option>
</select>
</div>

</div>

<button onclick="navrhni()">Navrhni výsadbu</button>

<div id="vysledek"></div>

</div>

<footer>
AI experiment – návrh trvalkových záhonů
</footer>

<script>

const rostliny = {

slunce:{
sucha:[
{name:"Levandule",color:"#8e7cc3",img:"https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg"},
{name:"Šanta",color:"#6fa8dc",img:"https://images.pexels.com/photos/931162/pexels-photo-931162.jpeg"},
{name:"Gaura",color:"#ffffff",img:"https://images.pexels.com/photos/1659438/pexels-photo-1659438.jpeg"}
],

normalni:[
{name:"Třapatka",color:"#e06666",img:"https://images.pexels.com/photos/1458283/pexels-photo-1458283.jpeg"},
{name:"Šalvěj",color:"#8e7cc3",img:"https://images.pexels.com/photos/931168/pexels-photo-931168.jpeg"}
],

vlhka:[
{name:"Ligulárie",color:"#ffd966",img:"https://images.pexels.com/photos/349758/hdr-flowers-349758.jpeg"}
]
},

polostin:{
normalni:[
{name:"Kakost",color:"#6d9eeb",img:"https://images.pexels.com/photos/931168/pexels-photo-931168.jpeg"},
{name:"Dlužicha",color:"#a64d79",img:"https://images.pexels.com/photos/349758/hdr-flowers-349758.jpeg"}
],

vlhka:[
{name:"Čechrava",color:"#f4cccc",img:"https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg"},
{name:"Pomněnkovec",color:"#6fa8dc",img:"https://images.pexels.com/photos/931162/pexels-photo-931162.jpeg"}
]
},

stin:{
vlhka:[
{name:"Hosta",color:"#93c47d",img:"https://images.pexels.com/photos/158063/hosta-leaves-green-plant-158063.jpeg"},
{name:"Plicník",color:"#6fa8dc",img:"https://images.pexels.com/photos/931177/pexels-photo-931177.jpeg"}
]
}

};

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

function navrhni(){

let sirka=parseFloat(document.getElementById("sirka").value);
let delka=parseFloat(document.getElementById("delka").value);
let svetlo=document.getElementById("svetlo").value;
let puda=document.getElementById("puda").value;

let data = rostliny[svetlo]?.[puda];

if(!data){
document.getElementById("vysledek").innerHTML="<p>Pro tyto podmínky zatím nemáme návrh.</p>";
return;
}

let vybrane=shuffle(data).slice(0,4);

let plocha=sirka*delka;
let pocet=Math.max(3,Math.round((plocha*5)/vybrane.length));

let html="<h3>Doporučená kombinace rostlin</h3>";
html+="<div class='cards'>";

let palette=[];

vybrane.forEach(r=>{

palette.push(r.color);

html+=`
<div class="card">
<img src="${r.img}">
<h4>${r.name}</h4>
<p><b>Počet:</b> ${pocet} ks</p>
</div>
`;

});

html+="</div>";

html+="<h3 style='margin-top:25px'>Barevná paleta záhonu</h3>";
html+="<div class='palette'>";

palette.forEach(c=>{
html+=`<div class="color-dot" style="background:${c}"></div>`;
});

html+="</div>";

html+="<h3 style='margin-top:25px'>Vizualizace výsadby</h3>";
html+="<div class='bed'>";

for(let i=0;i<80;i++){

let r=vybrane[i%vybrane.length];

html+=`<div class="cell" style="background:${r.color}"></div>`;

}

html+="</div>";

document.getElementById("vysledek").innerHTML=html;

}

</script>

</body>
</html>
