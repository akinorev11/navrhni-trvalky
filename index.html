<!DOCTYPE html>
<html lang="cs">

<head>
<meta charset="UTF-8">
<title>AI návrhář trvalkového záhonu</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
margin:0;
background:#eef4ef;
color:#2d3a2f;
}

header{
background:linear-gradient(120deg,#3b7d4a,#6fbf7f);
color:white;
padding:45px;
text-align:center;
}

header h1{
margin:0;
font-size:34px;
}

header p{
margin-top:10px;
opacity:.9;
}

.container{
max-width:1100px;
margin:auto;
margin-top:-40px;
padding:35px;
background:white;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,.15);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:600;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:25px;
width:100%;
padding:16px;
background:#3b7d4a;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
transition:.25s;
}

button:hover{
background:#2f623b;
transform:scale(1.02);
}

.result{
margin-top:35px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:20px;
}

.card{
background:#f3f8f4;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
margin-bottom:8px;
}

.card h4{
margin:5px 0;
color:#2f6b3b;
}

.palette{
display:flex;
gap:10px;
margin-top:10px;
}

.color-dot{
width:20px;
height:20px;
border-radius:50%;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-top:12px;
}

.cell{
background:#dfeee3;
padding:8px;
font-size:11px;
text-align:center;
border-radius:4px;
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<header>
<h1>🌿 AI návrhář trvalkového záhonu</h1>
<p>Navrhni ideální kombinaci rostlin podle podmínek zahrady</p>
</header>

<div class="container">

<div class="form-grid">

<div>
<label>Šířka záhonu (m)</label>
<input id="sirka" type="number" value="3">
</div>

<div>
<label>Délka záhonu (m)</label>
<input id="delka" type="number" value="2">
</div>

<div>
<label>Světlo</label>
<select id="svetlo">
<option value="slunce">Slunce</option>
<option value="polostin">Polostín</option>
<option value="stin">Stín</option>
</select>
</div>

<div>
<label>Půda</label>
<select id="puda">
<option value="sucha">Suchá</option>
<option value="normalni">Normální</option>
<option value="vlhka">Vlhká</option>
</select>
</div>

</div>

<button onclick="navrhni()">Navrhni výsadbu</button>

<div id="vysledek" class="result"></div>

</div>

<footer>
AI experiment – návrh trvalkových záhonů
</footer>

<script>

const databaze = {

slunce:{
sucha:[
{name:"Lavandula angustifolia",color:"#9c7bd5",bloom:"VI–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Lavandula_angustifolia.jpg/640px-Lavandula_angustifolia.jpg"},
{name:"Nepeta faassenii",color:"#6b8ed6",bloom:"V–IX",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Nepeta_faassenii.jpg/640px-Nepeta_faassenii.jpg"},
{name:"Gaura lindheimeri",color:"#ffffff",bloom:"VI–X",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Gaura_lindheimeri.jpg/640px-Gaura_lindheimeri.jpg"}
],

normalni:[
{name:"Salvia nemorosa",color:"#7a4cc2",bloom:"VI–IX",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Salvia_nemorosa.jpg/640px-Salvia_nemorosa.jpg"},
{name:"Echinacea purpurea",color:"#e0678d",bloom:"VII–IX",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Echinacea_purpurea.jpg/640px-Echinacea_purpurea.jpg"}
],

vlhka:[
{name:"Ligularia",color:"#ffd34f",bloom:"VII–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Ligularia_dentata.jpg/640px-Ligularia_dentata.jpg"}
]
},

polostin:{
normalni:[
{name:"Geranium Rozanne",color:"#6a8de6",bloom:"VI–X",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Geranium_Rozanne.jpg/640px-Geranium_Rozanne.jpg"},
{name:"Heuchera Palace Purple",color:"#8b3f56",bloom:"VI–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Heuchera_Palace_Purple.jpg/640px-Heuchera_Palace_Purple.jpg"}
],

vlhka:[
{name:"Astilbe",color:"#ff7fa3",bloom:"VI–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Astilbe.jpg/640px-Astilbe.jpg"},
{name:"Brunnera macrophylla",color:"#6c9ed8",bloom:"IV–V",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Brunnera_macrophylla.jpg/640px-Brunnera_macrophylla.jpg"}
]
},

stin:{
vlhka:[
{name:"Hosta",color:"#ffffff",bloom:"VII–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Hosta.jpg/640px-Hosta.jpg"},
{name:"Pulmonaria",color:"#6a87d9",bloom:"III–V",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Pulmonaria.jpg/640px-Pulmonaria.jpg"}
]
}

};

function shuffle(arr){
return [...arr].sort(()=>Math.random()-0.5);
}

function navrhni(){

let sirka=parseFloat(document.getElementById("sirka").value);
let delka=parseFloat(document.getElementById("delka").value);
let svetlo=document.getElementById("svetlo").value;
let puda=document.getElementById("puda").value;

let plocha=sirka*delka;
let hustota=5;

let rostliny = databaze[svetlo]?.[puda];

if(!rostliny){
document.getElementById("vysledek").innerHTML="<p>Pro tyto podmínky zatím nemáme data.</p>";
return;
}

let vybrane = shuffle(rostliny).slice(0,4);

let pocet=Math.max(3,Math.round((plocha*hustota)/vybrane.length));

let html="<h3>Doporučená kombinace rostlin</h3>";
html+="<div class='cards'>";

let palette=[];

vybrane.forEach(r=>{

palette.push(r.color);

html+=`
<div class="card">

<img src="${r.img}">

<h4>${r.name}</h4>

<p><b>Počet:</b> ${pocet} ks</p>
<p><b>Kvetení:</b> ${r.bloom}</p>

</div>
`;

});

html+="</div>";

html+="<h3 style='margin-top:30px'>Barevná paleta záhonu</h3>";
html+="<div class='palette'>";

palette.forEach(c=>{
html+=`<div class="color-dot" style="background:${c}"></div>`;
});

html+="</div>";

html+="<h3 style='margin-top:30px'>Vizualizace výsadby</h3>";
html+="<div class='grid'>";

for(let i=0;i<36;i++){

let r=vybrane[i%vybrane.length];

html+=`<div class="cell">${r.name.split(" ")[0]}</div>`;

}

html+="</div>";

document.getElementById("vysledek").innerHTML=html;

}

</script>

</body>
</html>
