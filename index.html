<!DOCTYPE html>
<html>

<head>
<title>Navrhni Trvalky</title>
<meta charset="UTF-8">
</head>

<body style="font-family: Arial; max-width:700px; margin:auto;">

<h1>🌿 Navrhni Trvalkový Záhon</h1>

<p>Zadej podmínky záhonu:</p>

<label>Světlo:</label><br>
<select id="svetlo">
<option>Slunce</option>
<option>Polostín</option>
<option>Stín</option>
</select>

<br><br>

<label>Půda:</label><br>
<select id="puda">
<option>Suchá</option>
<option>Normální</option>
<option>Vlhká</option>
</select>

<br><br>

<button onclick="navrhniRostliny()">Navrhni rostliny</button>

<p id="vysledek"></p>

<script>

function navrhniRostliny() {

let svetlo = document.getElementById("svetlo").value;
let puda = document.getElementById("puda").value;

let vysledek = "";

if (svetlo == "Slunce") {
    vysledek = "Doporučené rostliny: Levandule, Šalvěj hajní, Třapatka";
}

if (svetlo == "Polostín") {
    vysledek = "Doporučené rostliny: Kakost, Dlužicha, Čechrava";
}

if (svetlo == "Stín") {
    vysledek = "Doporučené rostliny: Kapradiny, Bohyška, Brunnera";
}

document.getElementById("vysledek").innerText = vysledek;

}

</script>

</body>
</html>
