<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<title>AI návrhář trvalkového záhonu</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#eef4ef;
color:#2d3a2f;
}

header{
background:linear-gradient(120deg,#3b7d4a,#6fbf7f);
color:white;
padding:40px;
text-align:center;
}

header h1{
margin:0;
font-size:32px;
}

header p{
margin-top:10px;
opacity:0.9;
}

.container{
max-width:1000px;
margin:auto;
margin-top:-40px;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#3b7d4a;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2f623b;
transform:scale(1.02);
}

.result{
margin-top:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#f3f8f4;
padding:15px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card h4{
margin:0 0 5px 0;
color:#2f6b3b;
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
font-size:14px;
color:#666;
}

</style>

</head>

<body>

<header>

<h1>🌿 AI návrhář trvalkového záhonu</h1>
<p>Navrhni ideální kombinaci rostlin podle podmínek zahrady</p>

</header>

<div class="container">

<div class="form-grid">

<div>

<label>Šířka záhonu (m)</label>
<input id="sirka" type="number" value="3">

</div>

<div>

<label>Délka záhonu (m)</label>
<input id="delka" type="number" value="2">

</div>

<div>

<label>Světlo</label>
<select id="svetlo">
<option value="slunce">Slunce</option>
<option value="polostin">Polostín</option>
<option value="stin">Stín</option>
</select>

</div>

<div>

<label>Půda</label>
<select id="puda">
<option>Suchá</option>
<option>Normální</option>
<option>Vlhká</option>
</select>

</div>

</div>

<button type="button" onclick="navrhni()">Navrhni výsadbu</button>

<div id="vysledek" class="result"></div>

</div>

<footer>

AI experiment – návrh trvalkových záhonů

</footer>

<script>

const databaze = {

slunce:[
{name:"Lavandula angustifolia",color:"fialová",bloom:"VI–VIII",img:"https://images.unsplash.com/photo-1597848212624-ea9b1b7d0f3e"},
{name:"Salvia nemorosa",color:"fialová",bloom:"VI–IX",img:"https://images.unsplash.com/photo-1598899134739-24c46f58f273"},
{name:"Echinacea purpurea",color:"růžová",bloom:"VII–IX",img:"https://images.unsplash.com/photo-1591886960571-74d43a9d4166"},
{name:"Nepeta faassenii",color:"modrá",bloom:"V–IX",img:"https://images.unsplash.com/photo-1501004318641-b39e6451bec6"},
{name:"Gaura lindheimeri",color:"bílá",bloom:"VI–X",img:"https://images.unsplash.com/photo-1502082553048-f009c37129b9"}
],

polostin:[
{name:"Geranium Rozanne",color:"modrá",bloom:"VI–X",img:"https://upload.wikimedia.org/wikipedia/commons/3/35/Geranium_Rozanne.jpg"},
{name:"Heuchera Palace Purple",color:"purpurová",bloom:"VI–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Heuchera_Palace_Purple.jpg"},
{name:"Astilbe chinensis",color:"růžová",bloom:"VI–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/6/6f/Astilbe.jpg"},
{name:"Brunnera macrophylla",color:"modrá",bloom:"IV–V",img:"https://upload.wikimedia.org/wikipedia/commons/1/1e/Brunnera_macrophylla.jpg"},
{name:"Alchemilla mollis",color:"žlutá",bloom:"VI–VII",img:"https://upload.wikimedia.org/wikipedia/commons/3/33/Alchemilla_mollis.jpg"}
],

stin:[
{name:"Hosta",color:"bílá",bloom:"VII–VIII",img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Hosta.jpg"},
{name:"Dryopteris filix-mas",color:"zelená",bloom:"nekvete",img:"https://upload.wikimedia.org/wikipedia/commons/0/03/Dryopteris_filix-mas.jpg"},
{name:"Pulmonaria",color:"modrá",bloom:"III–V",img:"https://upload.wikimedia.org/wikipedia/commons/7/76/Pulmonaria.jpg"},
{name:"Tiarella",color:"bílá",bloom:"IV–VI",img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Tiarella_cordifolia.jpg"}
]

};

function randomPlants(arr){

let copy=[...arr];
copy.sort(()=>Math.random()-0.5);
return copy.slice(0,4);

}

function navrhni(){

let sirka=parseFloat(document.getElementById("sirka").value);
let delka=parseFloat(document.getElementById("delka").value);
let svetlo=document.getElementById("svetlo").value;

let plocha=sirka*delka;
let hustota=5;

let rostliny=databaze[svetlo];

if(!rostliny){
document.getElementById("vysledek").innerHTML="Chyba databáze.";
return;
}

let vybrane=randomPlants(rostliny);

let pocet=Math.round((plocha*hustota)/vybrane.length);

let html="<h3>Doporučená kombinace rostlin</h3>";
html+="<div class='cards'>";

for(let i=0;i<vybrane.length;i++){

let r=vybrane[i];

html+=`
<div class="card">
<img src="${r.img}" style="width:100%;height:140px;object-fit:cover;border-radius:6px">
<h4>${r.name}</h4>
<p>Počet: ${pocet} ks</p>
<p>Barva květu: ${r.color}</p>
<p>Kvetení: ${r.bloom}</p>
</div>
`;

}

html+="</div>";

html+="<h3 style='margin-top:30px'>Vizualizace výsadby</h3>";

html+="<div style='display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:10px'>";

for(let i=0;i<36;i++){

let rostlina=vybrane[i%vybrane.length];

html+=`<div style="background:#dfeee3;padding:8px;font-size:10px;text-align:center;border-radius:4px;">
${rostlina.name.split(" ")[0]}
</div>`;

}

html+="</div>";

document.getElementById("vysledek").innerHTML=html;

}

</script>

</body>
</html>
