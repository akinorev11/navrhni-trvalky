<!DOCTYPE html>
<html lang="cs">
<head>

<meta charset="UTF-8">
<title>Navrhni Trvalky</title>

<style>

body{
font-family: Arial;
background:#f4f7f5;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
margin-top:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2f6b3b;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2f6b3b;
color:white;
border:none;
padding:15px;
font-size:16px;
border-radius:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#24542e;
}

.result{
background:#f1f7f2;
padding:20px;
border-radius:8px;
margin-top:20px;
}

.plant{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h1>🌿 AI návrhář trvalkového záhonu</h1>

<p>Zadej podmínky záhonu:</p>

<label>Šířka záhonu (m)</label>
<input id="sirka" type="number" value="3">

<label>Délka záhonu (m)</label>
<input id="delka" type="number" value="2">

<label>Světlo</label>
<select id="svetlo">
<option value="slunce">Slunce</option>
<option value="polostin">Polostín</option>
<option value="stin">Stín</option>
</select>

<label>Půda</label>
<select id="puda">
<option>Suchá</option>
<option>Normální</option>
<option>Vlhká</option>
</select>

<button onclick="navrhni()">Navrhni záhon</button>

<div id="vysledek" class="result"></div>

</div>

<script>

const databaze = {

slunce:[
"Lavandula angustifolia",
"Salvia nemorosa",
"Echinacea purpurea",
"Perovskia atriplicifolia",
"Nepeta faassenii",
"Gaura lindheimeri"
],

polostin:[
"Geranium Rozanne",
"Heuchera Palace Purple",
"Astilbe chinensis",
"Brunnera macrophylla",
"Alchemilla mollis",
"Hosta Halcyon"
],

stin:[
"Hosta",
"Dryopteris filix-mas",
"Brunnera",
"Pulmonaria",
"Tiarella",
"Polygonatum"
]

};

function nahodnePole(pole){

return pole.sort(()=>0.5-Math.random()).slice(0,4);

}

function navrhni(){

let sirka=document.getElementById("sirka").value;
let delka=document.getElementById("delka").value;
let svetlo=document.getElementById("svetlo").value;

let plocha=sirka*delka;

let rostliny=nahodnePole(databaze[svetlo]);

let hustota=5;

let pocet=Math.round((plocha*hustota)/rostliny.length);

let html="<h3>Doporučená výsadba</h3>";

rostliny.forEach(r=>{

html+=`<div class="plant">🌸 ${r} — ${pocet} ks</div>`;

});

document.getElementById("vysledek").innerHTML=html;

}

</script>

</body>
</html>
