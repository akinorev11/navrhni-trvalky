<!DOCTYPE html>
<html>

<head>
<title>Navrhni Trvalky</title>
<meta charset="UTF-8">
</head>

<body style="font-family: Arial; max-width:700px; margin:auto;">

<h1>🌿 Navrhni Trvalkový Záhon</h1>

<p>Zadej podmínky záhonu:</p>

<label>Šířka záhonu (m):</label><br>
<input id="sirka" type="number" value="3">

<br><br>

<label>Délka záhonu (m):</label><br>
<input id="delka" type="number" value="2">

<br><br>

<label>Světlo:</label><br>
<select id="svetlo">
<option>Slunce</option>
<option>Polostín</option>
<option>Stín</option>
</select>

<br><br>

<label>Půda:</label><br>
<select id="puda">
<option>Suchá</option>
<option>Normální</option>
<option>Vlhká</option>
</select>

<br><br>

<button onclick="navrhniRostliny()">Navrhni rostliny</button>

<h3>Návrh výsadby:</h3>

<p id="vysledek"></p>

<script>

function navrhniRostliny() {

let sirka = document.getElementById("sirka").value;
let delka = document.getElementById("delka").value;
let svetlo = document.getElementById("svetlo").value;

let plocha = sirka * delka;

let rostliny = "";
let hustota = 5;

if (svetlo == "Slunce") {
rostliny = ["Levandule", "Šalvěj hajní", "Třapatka"];
}

if (svetlo == "Polostín") {
rostliny = ["Kakost", "Dlužicha", "Čechrava"];
}

if (svetlo == "Stín") {
rostliny = ["Kapradina", "Bohyška", "Brunnera"];
}

let pocet = Math.round(plocha * hustota / rostliny.length);

let vysledek = "";

for (let i = 0; i < rostliny.length; i++) {
vysledek += rostliny[i] + " – " + pocet + " ks<br>";
}

document.getElementById("vysledek").innerHTML = vysledek;

}

</script>

</body>
</html>
